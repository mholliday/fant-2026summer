services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      # Override .env's localhost so the container reaches the mongo service
      - FANT_DB_URI=mongodb://mongo:27017/fant
    depends_on:
      - mongo
    networks:
      - fant

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8000/api/v2/
    networks:
      - fant

  mongo:
    image: mongo:7
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    networks:
      - fant

volumes:
  mongo_data:

networks:
  fant:
